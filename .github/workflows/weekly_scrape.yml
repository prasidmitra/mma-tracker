name: Weekly Data Scrape

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      creator:
        description: 'Creator to scrape (or "all")'
        required: false
        default: 'all'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/run_pipeline.py --creator ${{ github.event.inputs.creator || 'all' }} --skip-existing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      - name: Commit and push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Data: $(date +%Y-%m-%d)"
          git push
