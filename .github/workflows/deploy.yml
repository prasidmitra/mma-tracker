name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json
      - run: npm ci
        working-directory: src
      - run: npm run build
        working-directory: src
        env:
          NODE_ENV: production
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: src/dist
          branch: gh-pages
